"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 1000

format = """
[в•ӯв”Җ](fg:#565f89)\
$os\
[](bg:#7aa2f7 fg:#7dcfff)\
$directory\
[](fg:#7aa2f7 bg:#bb9af7)\
$git_branch\
$git_status\
[](fg:#bb9af7)\
$fill\
$git_metrics\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$cmd_duration\
[](fg:#1d2230)\
$time\
[](fg:#1d2230)\
[ в•¶в”Җв•®](fg:#565f89)
[в•°в”Җ](fg:#565f89)$character\
$fill\
[в”Җв•Ҝ](fg:#565f89)"""

right_format = ""

[fill]
symbol = "в”Җ"
style = "fg:#565f89"

[os]
disabled = false
style = "bg:#7dcfff fg:#1a1b26 bold"
format = "[ пҢғ ](bg:#7dcfff fg:#1a1b26 bold)"

[os.symbols]
Arch = "пҢғ"
EndeavourOS = "пҢў"
Manjaro = "пҢ’"
Linux = "п…ј"
Ubuntu = "пҢӣ"
Fedora = "пҢҠ"
Debian = "пҢҶ"
CentOS = "пҢ„"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "п…»"
Macos = "п…№"
Windows = "п…ә"
Redhat = "пҢ–"
Pop = "пҢӘ"

[directory]
style = "bg:#7aa2f7 fg:#1a1b26 bold"
truncation_length = 4
truncate_to_repo = false
format = "[ пҒ»  $path ]($style)"
read_only = " у°Ңҫ"
read_only_style = "bg:#7aa2f7 fg:#f7768e bold"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "оңҘ"
style = "bg:#bb9af7 fg:#1a1b26 bold"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#bb9af7 fg:#1a1b26 bold"
format = '([$all_status$ahead_behind ]($style))'
ahead = "у°ң®${count}"
behind = "у°ң·${count}"
diverged = "у°ң®${ahead_count} у°ң·${behind_count}"
conflicted = "у°һӣ${count}"
deleted = "у°Ҷҙ${count}"
renamed = "у°‘•${count}"
modified = "у°Ҹ«${count}"
staged = "у°җ•${count}"
untracked = "у°Ӣ—${count}"
stashed = "у°Ҹ—${count}"

[git_metrics]
disabled = false
added_style = "fg:#9ece6a bold"
deleted_style = "fg:#f7768e bold"
format = '[оӮ¶](fg:#9ece6a)[ +$added ]($added_style)[оӮҙ](fg:#9ece6a)[оӮ¶](fg:#f7768e)[ -$deleted ]($deleted_style)[оӮҙ](fg:#f7768e) '

[python]
symbol = "оңј"
style = "bg:#9ece6a fg:#1a1b26 bold"
format = '[оӮ¶](fg:#9ece6a)[ оңј  $version ]($style)[оӮҙ](fg:#9ece6a) '

[nodejs]
symbol = "оңҳ"
style = "bg:#9ece6a fg:#1a1b26 bold"
format = '[оӮ¶](fg:#9ece6a)[ оңҳ $version ]($style)[оӮҙ](fg:#9ece6a) '

[rust]
symbol = "оһЁ"
style = "bg:#f7768e fg:#1a1b26 bold"
format = '[оӮ¶](fg:#f7768e)[ оһЁ $version ]($style)[оӮҙ](fg:#f7768e) '

[golang]
symbol = "оңӨ"
style = "bg:#7dcfff fg:#1a1b26 bold"
format = '[оӮ¶](fg:#7dcfff)[ оңӨ $version ]($style)[оӮҙ](fg:#7dcfff) '

[docker_context]
symbol = "пҢҲ"
style = "bg:#7aa2f7 fg:#1a1b26 bold"
format = '[оӮ¶](fg:#7aa2f7)[ пҢҲ $context ]($style)[оӮҙ](fg:#7aa2f7) '

[kubernetes]
disabled = false
symbol = "уұғҫ"
style = "bg:#7aa2f7 fg:#1a1b26 bold"
format = '[оӮ¶](fg:#7aa2f7)[ уұғҫ $context(:$namespace) ]($style)[оӮҙ](fg:#7aa2f7) '

[cmd_duration]
min_time = 500
style = "bg:#ff9e64 fg:#1a1b26 bold"
format = '[оӮ¶](fg:#ff9e64)[ у°”  $duration ]($style)[оӮҙ](fg:#ff9e64) '

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:#1d2230 fg:#c0caf5 bold"
format = "[ пҖ— $time ]($style)"

[character]
success_symbol = "[вқҜ](fg:#7dcfff bold)"
error_symbol = "[вқҜ](fg:#f7768e bold)"
vimcmd_symbol = "[вқ®](fg:#bb9af7 bold)"
